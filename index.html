<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soma Soul Seoul | Sovereign Growth 2031</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #C5A059;
      --gold-light: #D4B078;
      --charcoal: #111111;
      --white: #FAFAF8;
      --border: rgba(197,160,89,0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--charcoal);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    /* Grain Overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 6%;
      border-bottom: 1px solid var(--border);
      background: rgba(17,17,17,0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .nav-logo img { height: 44px; width: auto; display: block; }

    .nav-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

    .nav-status {
      font-size: 0.57rem;
      letter-spacing: 1.5px;
      color: var(--gold);
      text-transform: uppercase;
      font-weight: 600;
      line-height: 1.6;
      text-align: right;
    }

    .nav-apply {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
      border-bottom: 1px solid var(--gold);
      padding-bottom: 2px;
      transition: color 0.3s;
      font-weight: 500;
    }
    .nav-apply:hover { color: var(--gold); }

    /* HERO SECTION */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 130px 6% 90px;
      position: relative;
    }

    .hero-eyebrow {
      font-size: 0.58rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
      font-weight: 500;
      opacity: 0;
      animation: fadeUp 1s 0.2s forwards;
    }

    .hero-logo {
      width: clamp(180px, 28vw, 280px);
      height: auto;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 1.3s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 8.5vw, 6rem);
      font-weight: 400;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 22px;
      opacity: 0;
      animation: fadeUp 1s 0.8s forwards;
    }

    .hero-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.95rem, 2vw, 1.35rem);
      font-style: italic;
      color: rgba(250,250,248,0.4);
      letter-spacing: 1.5px;
      margin-bottom: 52px;
      opacity: 0;
      animation: fadeUp 1s 1.1s forwards;
    }

    /* PHILOSOPHY SECTIONS */
    .section-divider { width: 1px; height: 80px; background: linear-gradient(to bottom, transparent, var(--gold), transparent); margin: 0 auto; }
    .section-label { font-size: 0.57rem; letter-spacing: 5px; text-transform: uppercase; color: var(--gold); margin-bottom: 56px; font-weight: 500; text-align: center; }

    .manifesto { padding: 120px 6%; max-width: 840px; margin: 0 auto; text-align: center; }
    .manifesto-opener { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.5rem, 3.5vw, 2.5rem); font-weight: 300; line-height: 1.65; margin-bottom: 20px; }
    .manifesto-opener strong { font-weight: 400; color: var(--gold); }
