<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOMA SOUL SEOUL | 2031</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700&family=Playfair+Display:ital,wght@1,400&family=Noto+Serif+KR:wght@200;400&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #efefef; }
        .serif { font-family: 'Playfair Display', serif; }
        .kr-serif { font-family: 'Noto Serif KR', serif; }
    </style>
</head>
<body class="selection:bg-white selection:text-black">

    <nav class="fixed top-0 w-full z-50 flex justify-between items-center px-8 py-10 md:px-20 bg-[#0a0a0a]/80 backdrop-blur-xl border-b border-white/5">
        <a href="index.html" class="flex items-center space-x-6 group cursor-pointer">
            <div class="relative">
                <div class="absolute -inset-1 bg-gradient-to-r from-yellow-700 to-yellow-500 rounded-full blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
                <div class="relative h-14 w-14 bg-white rounded-full p-1.5 border border-white/10 overflow-hidden shadow-2xl flex items-center justify-center">
                    <img src="logo.png" alt="LOGO" class="h-full w-full object-contain scale-110" style="filter: none !important;">
                </div>
            </div>
            <div class="flex flex-col text-left">
                <span class="text-[10px] tracking-[0.5em] font-bold uppercase text-white leading-none mb-1">SOMA SOUL SEOUL</span>
                <span class="text-[8px] tracking-[0.3em] font-light uppercase text-gray-500">2031 Protocol</span>
            </div>
        </a>
        <div class="flex space-x-12 text-[9px] uppercase tracking-[0.4em] font-light text-gray-400">
            <a href="#mission" class="hover:text-white transition-colors">Mission</a>
            <a href="protocol.html" class="hover:text-white transition-all">Protocol</a>
        </div>
    </nav>

    <main class="relative pt-64 pb-32 px-8 md:px-20">
        <section class="max-w-6xl mx-auto mb-48 text-left">
            <h1 class="text-5xl md:text-8xl font-extralight tracking-tight leading-[0.9] mb-20">
                Architecting the <br />
                <span class="serif italic text-gray-500">Resilient Lineage</span>.
            </h1>
            <p class="kr-serif text-2xl md:text-4xl font-light text-white opacity-90 tracking-widest leading-relaxed">
                가장 고귀한 것을 지키는 힘, <br />
                <span class="opacity-30">새로운 시대를 선도하는 정신.</span>
            </p>
        </section>

        <section id="mission" class="relative z-10 py-32 border-t border-white/10">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-20">
                <div class="space-y-12">
                    <p class="kr-serif text-2xl md:text-3xl text-white leading-relaxed font-light">
                        우리의 미션은 AI 시대 속에서도 인간이 주권을 잃지 않도록 가족과 공동체의 사고력과 중심을 세우는 것입니다.
                    </p>
                    <p class="kr-serif text-lg text-gray-400 leading-relaxed font-light">
                        기술은 계속 발전하지만, 판단하고 의미를 선택하는 힘은 인간에게 있습니다. 우리는 더 깊은 사고, 더 건강한 대화, 더 단단한 내면을 세웁니다.
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer class="px-8 md:px-20 py-16 border-t border-white/5 opacity-30 text-[9px] tracking-[0.4em] uppercase text-center">
        © 2026 Soma Soul Seoul
    </footer>
</body>
</html>
