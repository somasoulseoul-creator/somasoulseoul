<html lang="ko">

    <title>Soma Soul Seoul | Protocol 2031</title>
    <style>
        :root { --orange: #FF4D00; --bg: #F2F2F2; --black: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--black); overflow-x: hidden; }

        /* THE GATEKEEPER */
        #gatekeeper {
            position: fixed; inset: 0; background: var(--black); color: white;
            z-index: 1000; display: flex; flex-direction: column; justify-content: space-between;
            padding: 40px; transition: transform 0.8s cubic-bezier(0.82, 0, 0.18, 1);
        }
        .gate-header { font-family: monospace; font-size: 10px; opacity: 0.5; display: flex; justify-content: space-between; }
        .gate-title { font-size: 10vw; font-weight: 900; line-height: 0.8; text-transform: uppercase; font-style: italic; }
        .gate-btn { background: white; color: black; padding: 20px 40px; border-radius: 100px; font-weight: 900; border: none; cursor: pointer; align-self: flex-end; }
        .gate-btn:hover { background: var(--orange); color: white; }

        /* THE GRID SYSTEM */
        nav { sticky top: 0; background: var(--bg); border-bottom: 2px solid var(--black); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .hero { display: grid; grid-template-columns: 1fr; border-bottom: 2px solid var(--black); }
        @media (min-width: 768px) { .hero { grid-template-columns: 7fr 5fr; } }
        .hero-left { padding: 60px; border-right: 2px solid var(--black); min-height: 60vh; display: flex; flex-direction: column; justify-content: space-between; }
        .hero-right { display: flex; flex-direction: column; }
        .box { padding: 40px; border-bottom: 2px solid var(--black); flex: 1; }
        .box:last-child { border-bottom: 0; background: var(--black); color: white; }
        
        .huge-text { font-size: 12vw; font-weight: 900; line-height: 0.75; text-transform: uppercase; font-style: italic; }
        .marquee { background: var(--orange); padding: 20px 0; border-bottom: 2px solid var(--black); overflow: hidden; white-space: nowrap; }
        .marquee span { font-size: 30px; font-weight: 900; text-transform: uppercase; display: inline-block; animation: scroll 20s linear infinite; }
        
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    </style>
</head>
