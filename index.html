<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soma Soul Seoul | Sovereign Growth 2031</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #C5A059;
      --gold-light: #D4B078;
      --charcoal: #111111;
      --white: #FAFAF8;
      --border: rgba(197,160,89,0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--charcoal);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    /* Grain Overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 6%;
      border-bottom: 1px solid var(--border);
      background: rgba(17,17,17,0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    /* Navigation Logo Control */
    .nav-logo img { 
      height: 44px; 
      width: auto; 
      display: block; 
      object-fit: contain; 
    }

    .nav-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

    .nav-status {
      font-size: 0.57rem;
      letter-spacing: 1.5px;
      color: var(--gold);
      text-transform: uppercase;
      font-weight: 500;
      line-height: 1.6;
      text-align: right;
    }

    .nav-apply {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
      border-bottom: 1px solid var(--gold);
      padding-bottom: 2px;
      transition: color 0.3s;
      font-weight: 500;
    }
    .nav-apply:hover { color: var(--gold); }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 130px 6% 90px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 42%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(197,160,89,0.06) 0%, transparent 68%);
      pointer-events: none;
    }

    /* Hero Logo Control */
    .hero-logo {
      width: clamp(180px, 28vw, 280px);
      height: auto;
      margin-bottom: 52px;
      opacity: 0;
      animation: fadeUp 1.3s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
      position: relative;
      z-index: 1;
      object-fit: contain;
    }

    .hero-eyebrow {
      font-size: 0.58rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
      font-weight: 500;
      opacity: 0;
      animation: fadeUp 1s 0.9s forwards;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 8.5vw, 6rem);
      font-weight: 400;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 22px;
      opacity: 0;
      animation: fadeUp 1s 1.1s forwards;
    }

    .hero-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.95rem, 2vw, 1.35rem);
      font-style: italic;
      color: rgba(250,250,248,0.4);
      letter-spacing: 1px;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 1s 1.25s forwards;
    }

    .hero-tagline-kr {
      font-size: 0.68rem;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 52px;
      opacity: 0;
      animation: fadeUp 1s 1.4s forwards;
    }

    .hero-cta {
      display: inline-block;
      font-size: 0.63rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--white);
      border: 1px solid rgba(250,250,248,0.18);
      padding: 16px 48px;
      text-decoration: none;
      transition: all 0.4s;
      font-weight: 500;
      opacity: 0;
      animation: fadeUp 1s 1.55s forwards;
    }
    .hero-cta:hover { background: var(--gold); border-color: var(--gold); color: var(--charcoal); }

    /* Standardized Section Styling */
    .section-divider {
      width: 1px; height: 80px;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.57rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 56px;
      font-weight: 500;
    }

    .manifesto { padding: 120px 6%; max-width: 840px; margin: 0 auto; text-align: center; }

    .manifesto-opener {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.5rem, 3.5vw, 2.5rem);
      font-weight: 300;
      line-height: 1.65;
      color: var(--white);
      margin-bottom: 20px;
    }
    .manifesto-opener strong { font-weight: 400; color: var(--gold); }

    .manifesto-rule { width: 40px; height: 1px; background: var(--gold); margin: 44px auto; }

    .manifesto-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2vw, 1.35rem);
      font-weight: 300;
      color: rgba(250,250,248,0.48);
      line-height: 1.85;
    }
    .manifesto-sub strong { color: rgba(250,250,248,0.82); font-weight: 400; }

    .not-for-section { padding: 0 6% 120px; }

    .not-for-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      max-width: 1060px;
      margin: 0 auto;
    }

    .not-for-col { padding: 58px 50px; border: 1px solid var(--border); }
    .col-yes { border-color: rgba(197,160,89,0.32); }

    .col-label {
      font-size: 0.55rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 38px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .col-no .col-label  { color: rgba(250,250,248,0.22); }
    .col-yes .col-label { color: var(--gold); }
    .col-label::after { content: ''; flex: 1; height: 1px; }
    .col-no .col-label::after  { background: rgba(250,250,248,0.07); }
    .col-yes .col-label::after { background: rgba(197,160,89,0.22); }

    .col-items { list-style: none; display: flex; flex-direction: column; gap: 26px; }

    .col-items li {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 1.6vw, 1.18rem);
      font-weight: 300;
      line-height: 1.65;
      padding-left: 22px
