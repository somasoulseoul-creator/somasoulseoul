<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOMA SOUL SEOUL | 2031</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }
        .gold-text { color: #d4b465; }
        .gold-border { border-color: #d4b465; }
        .tracking-ultra { letter-spacing: 0.4em; }
        .logo-container img { height: 100px; width: auto; } /* Increased logo size */
        .brand-text { font-size: 2.2rem; } /* Increased brand text size */
    </style>
</head>
<body>

    <header class="px-6 py-10 md:px-12 flex justify-between items-center bg-white">
        <div class="flex items-center gap-6">
            <div class="logo-container">
                <img src="logo.png" alt="Soma Soul Seoul Logo">
            </div>
            <div class="brand-text font-extrabold tracking-tighter uppercase italic">
                Somasoul<span class="text-zinc-400">seoul</span>
            </div>
        </div>
        
        <nav class="hidden md:flex gap-12 text-[11px] font-bold tracking-widest uppercase text-zinc-400">
            <a href="#insights" class="hover:text-black transition-colors">World Insights</a>
            <a href="#archive" class="text-black border-b-2 gold-border pb-1">Archive 자료실</a>
            <a href="#instagram" class="hover:text-black transition-colors">Instagram</a>
        </nav>
    </header>

    <main>
        <section class="px-6 md:px-12 pt-32 pb-40 max-w-7xl">
            <p class="text-[11px] tracking-ultra text-zinc-400 uppercase mb-8">
                Inspired by sense • Built for 2031
            </p>
            
            <h2 class="text-7xl md:text-8xl font-extrabold tracking-tight leading-[1.1] mb-12">
                The Architecture of <br>
                <span class="gold-text">Sovereign Growth.</span>
            </h2>

            <p class="text-2xl md:text-3xl text-zinc-500 font-light max-w-3xl leading-relaxed">
                Instagram provides the inspiration. Somasoul Seoul provides the forensic evidence.
            </p>
        </section>

        <section class="bg-[#0f141e] py-32 px-6 md:px-12">
            <div class="max-w-7xl">
                <h3 class="text-3xl md:text-5xl font-extrabold tracking-tighter gold-text uppercase">
                    The 2031 World Education Report
                </h3>
            </div>
        </section>
    </main>

</body>
</html>
