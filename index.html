<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma Soul Seoul | The Architecture of Sovereign Growth</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C5A059;
            --charcoal: #1A1A1A;
            --off-white: #F9F9F9;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--off-white);
            color: var(--charcoal);
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            position: absolute;
            width: 90%;
            z-index: 100;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--charcoal);
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-left: 2rem;
            text-transform: uppercase;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }

        .nav-links a:hover {
            border-bottom: 1px solid var(--gold);
        }

        /* Hero Section */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 8vw, 6rem);
            margin: 0;
            font-weight: 400;
        }

        .subtitle {
            font-size: 1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--gold);
            margin: 1rem 0 3rem 0;
        }

        .cta-button {
            padding: 1rem 2.5rem;
            border: 1px solid var(--charcoal);
            background: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            font-size: 0.9rem;
        }

        .cta-button:hover {
            background: var(--charcoal);
            color: var(--off-white);
        }

        /* Mission Section */
        .vision-section {
            padding: 100px 10%;
            background: #fff;
            text-align: center;
        }

        .vision-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }

        .card {
            padding: 40px;
            border: 1px solid #eee;
            transition: 0.3s;
        }

        .card:hover {
            border-color: var(--gold);
        }

        .card h3 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
        }

        /* Footer */
        footer {
            padding: 50px 10%;
            border-top: 1px solid #eee;
            font-size: 0.7rem;
            text-align: center;
            letter-spacing: 1px;
        }

        .vanguard-badge {
            font-size: 0.6rem;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>

            <a href="#">Apply</a>
        </div>
    </nav>
