<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --paper:#FAF8F3;
  --ink:#171712;
  --muted:#7C766A;
  --gold:#BE9A4D;
  --gold-deep:#8A6F30;
  --gold-soft:#F2ECDC;
  --line:#E6DFCD;
}
body{
  background:var(--paper);color:var(--ink);
  font-family:'Pretendard',-apple-system,sans-serif;
  line-height:1.6;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
.serif{font-family:'Noto Serif KR',serif;font-style:normal}
a{color:inherit;text-decoration:none}
.wrap{max-width:980px;margin:0 auto;padding:0 clamp(1.25rem,5vw,3rem)}
:focus-visible{outline:2px solid var(--gold-deep);outline-offset:3px;border-radius:4px}

/* nav */
nav{position:sticky;top:0;z-index:50;background:rgba(250,248,243,.9);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.nav-in{display:flex;justify-content:space-between;align-items:center;padding:.85rem 0}
.brand{display:flex;align-items:center;gap:.6rem}
.brand img{height:42px;width:auto;display:block}
.brand-lock{display:flex;flex-direction:column;line-height:1.08}
.brand-en{font-size:.82rem;font-weight:800;letter-spacing:.14em}
.brand-ko{font-size:.62rem;font-weight:500;letter-spacing:.04em;color:var(--muted)}
.nav-cta{background:var(--ink);color:#fff;font-size:.78rem;font-weight:600;
  padding:.5rem 1.1rem;border-radius:100px;transition:background .2s}
.nav-cta:hover{background:var(--gold);color:var(--ink)}
.nav-right{display:flex;align-items:center;gap:1.6rem}
.nav-links{display:none}
.nav-links a{font-size:.72rem;font-weight:600;letter-spacing:.13em;
  color:var(--muted);text-transform:uppercase;transition:color .2s}
.nav-links a:hover{color:var(--ink)}
@media(min-width:760px){.nav-links{display:flex;gap:2rem}}

/* hero */
.hero{padding:clamp(3.5rem,9vw,7rem) 0 clamp(3rem,7vw,5.5rem)}
.eyebrow{display:inline-flex;align-items:center;gap:.55rem;font-size:.74rem;
  font-weight:600;letter-spacing:.04em;color:var(--gold-deep);margin-bottom:1.6rem}
.eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
.hero h1{font-size:clamp(2.4rem,7.5vw,5.25rem);font-weight:800;line-height:1.12;
  letter-spacing:-.03em;margin-bottom:1.5rem;max-width:17ch}
.hero h1 em{font-style:normal;color:var(--gold-deep)}
.hero p{font-size:clamp(1rem,2.2vw,1.18rem);color:var(--muted);
  max-width:34rem;line-height:1.8}
.hero p b{color:var(--ink);font-weight:600}
.hero-btns{margin-top:2.4rem;display:flex;gap:.8rem;flex-wrap:wrap}
.btn{display:inline-block;padding:.85rem 1.7rem;border-radius:100px;
  font-size:.92rem;font-weight:600;transition:transform .18s,background .2s,border-color .2s}
.btn-fill{background:var(--ink);color:#fff}
.btn-fill:hover{background:var(--gold);color:var(--ink);transform:translateY(-1px)}
.btn-line{border:1.5px solid var(--line);color:var(--ink)}
.btn-line:hover{border-color:var(--gold);transform:translateY(-1px)}

/* lead — personal thesis under hero */
.lead{border-top:1px solid var(--line)}
.lead .wrap{padding:clamp(2.8rem,6vw,4.5rem) clamp(1.25rem,5vw,3rem)}
.lead-set{font-size:clamp(.95rem,2vw,1.1rem);color:var(--muted);margin-bottom:.95rem}
.lead-insight{font-size:clamp(1.4rem,4vw,2.1rem);font-weight:700;line-height:1.55;
  letter-spacing:-.01em;color:var(--ink);max-width:26ch}
.lead-insight em{font-style:normal;color:var(--gold-deep)}

/* founding narrative — signature */
.founding{border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  background:var(--gold-soft)}
.founding .wrap{padding:clamp(3.5rem,8vw,6rem) clamp(1.25rem,5vw,3rem)}
.founding .kicker{font-size:.72rem;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--gold-deep);margin-bottom:2rem}
.f-line{font-size:clamp(1.35rem,4vw,2.3rem);font-weight:700;line-height:1.5;
  letter-spacing:-.01em;color:var(--muted)}
.f-line + .f-line{margin-top:.5rem}
.f-line.now{color:var(--ink)}
.f-line .mark{color:var(--ink)}
.f-line.now .mark{color:var(--gold-deep)}

/* pillars */
.pillars{padding:clamp(3.5rem,8vw,6rem) 0}
.sec-kicker{font-size:.72rem;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--gold);margin-bottom:1rem}
.sec-h{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;letter-spacing:-.02em;
  margin-bottom:.6rem}
.sec-note{color:var(--muted);max-width:34rem;margin-bottom:2.6rem}
.p-grid{display:grid;grid-template-columns:1fr;gap:1.2rem}
@media(min-width:720px){.p-grid{grid-template-columns:1fr 1fr}}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;
  padding:clamp(1.6rem,3.5vw,2.2rem);transition:border-color .2s,transform .2s}
.card:hover{border-color:var(--gold);transform:translateY(-2px)}
.card .tag{font-size:.74rem;font-weight:600;letter-spacing:.04em;color:var(--gold);
  margin-bottom:.9rem}
.card h3{font-size:1.3rem;font-weight:700;margin-bottom:.7rem}
.card p{color:var(--muted);font-size:.98rem;line-height:1.75}

/* newsletter */
.news{background:var(--ink);color:#fff}
.news .wrap{padding:clamp(3.5rem,8vw,6rem) clamp(1.25rem,5vw,3rem)}
.news-kicker{font-size:.72rem;font-weight:700;letter-spacing:.16em;
  text-transform:uppercase;color:var(--gold);margin-bottom:1rem}
.news h2{font-family:'Noto Serif KR',serif;font-weight:500;
  font-size:clamp(1.9rem,5vw,2.8rem);letter-spacing:-.01em;margin-bottom:.7rem}
.news .sub{color:rgba(255,255,255,.7);font-size:1.02rem;margin-bottom:.5rem}
.news .body{color:rgba(255,255,255,.6);max-width:32rem;margin-bottom:2rem;line-height:1.8}

<form class="nl-form" id="nlForm" novalidate>
  <input type="email" id="nlEmail" placeholder="이메일 주소" autocomplete="email" aria-label="이메일 주소"/>
  <button type="submit">레터 구독하기</button>
</form>
<p class="nl-msg" id="nlMsg" role="status" aria-live="polite"></p>

<p class="nl-foot">소마소울은 아이를 바꾸는 방법보다,
  아이를 이해하는 문화를 만들고자 합니다.</p>
</div>
</section>

<footer>
  <div class="wrap foot-in">
    <a href="https://instagram.com/somasoulseoul" target="_blank" rel="noopener">@somasoulseoul</a>
    <span>© 2026 소마소울 서울 · Seoul</span>
  </div>
</footer>

<script>
(function(){
  var form = document.getElementById('nlForm');
  var email = document.getElementById('nlEmail');
  var msg = document.getElementById('nlMsg');
  var valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function subscribe(addr){
    /* ===== SUPABASE / STIBEE ENDPOINT GOES HERE later ===== */
    msg.innerHTML = '구독 시스템을 준비 중이에요. 지금은 인스타그램 ' +
      '<a href="https://instagram.com/somasoulseoul" target="_blank" rel="noopener">@somasoulseoul</a>' +
      ' DM으로 <b>레터</b>를 보내주시면 가장 먼저 소식을 받아보실 수 있어요. 🌿';
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    var addr = email.value.trim();
    if(!valid.test(addr)){
      msg.textContent = '올바른 이메일 주소를 입력해 주세요.';
      email.focus();
      return;
    }
    subscribe(addr);
    email.value = '';
  });
})();
</script>
</body>
</html>
